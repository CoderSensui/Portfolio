<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tools — lxwis.site</title>
  <meta name="description" content="Web utilities by lxwis — lightweight browser tools."/>
  <meta property="og:title" content="Tools — lxwis.site"/>
  <meta property="og:image" content="https://i.imgur.com/9jrzHF1_d.webp?maxwidth=760&fidelity=grand"/>
  <meta name="theme-color" content="#00e5ff"/>
  <link rel="icon" type="image/webp" href="https://i.imgur.com/9jrzHF1_d.webp?maxwidth=64&fidelity=grand"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#06090f;--sur:rgba(255,255,255,.038);--bd:rgba(255,255,255,.08);--g:#39ff8c;--gd:rgba(57,255,140,.12);--cy:#00e5ff;--cyd:rgba(0,229,255,.12);--vi:#9d6eff;--ro:#ff6b8a;--go:#f5c542;--w:#edf2f7;--tx:#a8bcd4;--mu:#3d4f66;--mu2:#607080;--mo:'Space Mono',monospace;--sa:'Syne',sans-serif;--bo:'Outfit',sans-serif;--ease:cubic-bezier(.4,0,.2,1);--sp:cubic-bezier(.34,1.56,.64,1);--t:.3s}
    html{font-size:16px}
    body{background:var(--bg);color:var(--tx);font-family:var(--bo);overflow-x:hidden;min-height:100vh}
    a{text-decoration:none;color:inherit}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--cy);border-radius:2px}
    @media(pointer:fine){body{cursor:none}}
    .cursor{display:none;position:fixed;width:30px;height:30px;border:1.5px solid var(--cy);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width .3s,height .3s,background .3s;will-change:left,top}
    .cursor-dot{display:none;position:fixed;width:5px;height:5px;background:var(--cy);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%)}
    .cursor.big{width:50px;height:50px;background:var(--cyd)}
    @media(pointer:fine){.cursor,.cursor-dot{display:block}}
    #bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
    .noise{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px}
    nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;gap:1.5rem;padding:1.2rem 2.5rem;transition:background .4s,border-bottom .4s}
    nav.scrolled{background:rgba(6,9,15,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd)}
    .nav-logo{font-family:var(--mo);font-size:1rem;letter-spacing:.05em;margin-right:auto}
    .nav-logo .lx{color:var(--w)}.nav-logo .wis{color:var(--g)}.blink{animation:blink 1s step-end infinite;color:var(--g)}
    .nav-links{display:flex;gap:1.75rem}
    .nav-links a{font-family:var(--mo);font-size:.74rem;color:var(--mu2);letter-spacing:.1em;position:relative;transition:color var(--t)}
    .nav-links a::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:1px;background:var(--cy);transition:width var(--t)}
    .nav-links a:hover,.nav-links a.active{color:var(--w)}.nav-links a:hover::after,.nav-links a.active::after{width:100%}
    .nav-back{font-family:var(--mo);font-size:.72rem;color:var(--cy);border:1px solid rgba(0,229,255,.28);padding:.42rem .9rem;border-radius:4px;transition:background var(--t),color var(--t)}
    .nav-back:hover{background:var(--cy);color:var(--bg)}
    .nav-toggle{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px}
    .nav-toggle span{display:block;width:22px;height:1.5px;background:var(--w);transition:var(--t)}
    .nav-toggle.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}.nav-toggle.open span:nth-child(2){opacity:0}.nav-toggle.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}
    .mob{position:fixed;inset:0;z-index:999;background:rgba(6,9,15,.97);backdrop-filter:blur(24px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2.5rem;transform:translateX(100%);transition:transform .45s var(--ease)}
    .mob.open{transform:translateX(0)}
    .mob a{font-family:var(--sa);font-size:2.2rem;font-weight:800;color:var(--w);transition:color var(--t)}.mob a:hover{color:var(--cy)}
    .page-hero{position:relative;z-index:2;padding:9rem 2.5rem 4rem;text-align:center}
    .eyebrow{display:inline-flex;align-items:center;gap:.55rem;font-family:var(--mo);font-size:.68rem;color:var(--mu2);border:1px solid var(--bd);border-radius:100px;padding:.34rem .9rem;margin-bottom:1.75rem;letter-spacing:.1em}
    .page-title{font-family:var(--sa);font-size:clamp(2.8rem,8vw,5.5rem);font-weight:800;letter-spacing:-.04em;color:var(--w);margin-bottom:.85rem;line-height:1}
    .page-title .hi{color:var(--cy)}
    .page-sub{font-family:var(--mo);font-size:.82rem;color:var(--mu2);max-width:480px;margin:0 auto 2.5rem;line-height:1.75}
    .tools-section{position:relative;z-index:2;padding:0 2.5rem 6rem;max-width:1200px;margin:0 auto}
    .sec-div{font-family:var(--mo);font-size:.62rem;color:var(--mu);letter-spacing:.15em;text-transform:uppercase;display:flex;align-items:center;gap:1rem;margin:3rem 0 1.5rem}
    .sec-div::after{content:'';flex:1;height:1px;background:var(--bd)}
    .tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:1rem}
    .tool-card{background:var(--sur);border:1px solid var(--bd);border-radius:16px;overflow:hidden;transition:border-color var(--t),box-shadow var(--t),transform .35s var(--sp);cursor:pointer}
    .tool-card:hover{border-color:var(--card-accent,rgba(0,229,255,.25));box-shadow:0 12px 40px rgba(0,0,0,.4);transform:translateY(-4px)}
    .tool-card.expanded{border-color:var(--card-accent,rgba(0,229,255,.35));box-shadow:0 16px 50px rgba(0,0,0,.5)}
    .card-head{display:flex;align-items:center;gap:1rem;padding:1.25rem 1.4rem;user-select:none}
    .card-emoji{font-size:1.9rem;flex-shrink:0;transition:transform .35s var(--sp)}
    .tool-card.expanded .card-emoji,.tool-card:hover .card-emoji{transform:scale(1.15) rotate(-6deg)}
    .card-info{flex:1;min-width:0}
    .card-name{font-family:var(--sa);font-size:1.05rem;font-weight:800;color:var(--w);margin-bottom:.18rem}
    .card-cat{font-family:var(--mo);font-size:.6rem;color:var(--card-accent-text,var(--cy));letter-spacing:.08em;text-transform:uppercase}
    .chip{font-family:var(--mo);font-size:.56rem;padding:.12rem .45rem;border-radius:3px;letter-spacing:.06em;display:inline-block;margin-top:.35rem}
    .chip-live{color:var(--cy);background:var(--cyd);border:1px solid rgba(0,229,255,.2)}
    .chip-soon{color:var(--mu2);background:rgba(255,255,255,.04);border:1px solid var(--bd)}
    .card-chevron{color:var(--mu2);font-size:.85rem;transition:transform var(--t),color var(--t);flex-shrink:0}
    .tool-card.expanded .card-chevron{transform:rotate(180deg);color:var(--card-accent-text,var(--cy))}
    .card-body{max-height:0;overflow:hidden;transition:max-height .45s var(--ease)}
    .card-body.open{max-height:900px}
    .card-body-inner{padding:0 1.4rem 1.4rem;display:flex;flex-direction:column;gap:1rem}
    .card-desc{font-size:.87rem;color:var(--mu2);line-height:1.7}
    .tui{display:flex;flex-direction:column;gap:.75rem}
    .tlb{font-family:var(--mo);font-size:.66rem;color:var(--mu);letter-spacing:.1em;text-transform:uppercase}
    .tin{width:100%;padding:.75rem .9rem;background:rgba(0,0,0,.3);border:1px solid var(--bd);border-radius:8px;color:var(--w);font-family:var(--mo);font-size:.82rem;outline:none;transition:border-color var(--t);resize:vertical;min-height:72px}
    .tin:focus{border-color:var(--cy)}
    .trow{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center}
    .tout{width:100%;padding:.9rem 1rem;background:rgba(0,0,0,.3);border:1px solid var(--bd);border-radius:8px;font-family:var(--mo);font-size:.82rem;line-height:1.75;min-height:52px;word-break:break-all;white-space:pre-wrap}
    .tout.cy{color:var(--cy)}.tout.g{color:var(--g)}.tout.vi{color:var(--vi)}.tout.mu{color:var(--mu2)}.tout.go{color:var(--go)}
    .tstats{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem}
    .tstat{background:rgba(0,0,0,.3);border:1px solid var(--bd);border-radius:8px;padding:.7rem .5rem;text-align:center;display:flex;flex-direction:column;gap:.25rem}
    .tstat-v{font-family:var(--mo);font-size:1.1rem;font-weight:700}
    .tstat-l{font-family:var(--mo);font-size:.55rem;color:var(--mu2);letter-spacing:.08em;text-transform:uppercase}
    .tbtn{display:inline-flex;align-items:center;gap:.4rem;font-family:var(--mo);font-size:.7rem;font-weight:700;letter-spacing:.07em;padding:.6rem 1.1rem;border-radius:4px;border:none;cursor:pointer;transition:transform var(--t) var(--sp),box-shadow var(--t)}
    .tbtn.cy{background:var(--cy);color:#06090f}.tbtn.cy:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,229,255,.3)}
    .tbtn.g{background:var(--g);color:#06090f}.tbtn.g:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(57,255,140,.3)}
    .tbtn.vi{background:var(--vi);color:#fff}.tbtn.vi:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(157,110,255,.3)}
    .tbtn.go{background:var(--go);color:#06090f}.tbtn.go:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(245,197,66,.3)}
    .tbtn.ro{background:var(--ro);color:#fff}.tbtn.ro:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(255,107,138,.3)}
    .tbtn.bd{background:transparent;color:var(--mu2);border:1px solid var(--bd)}.tbtn.bd:hover{color:var(--w);border-color:rgba(255,255,255,.2)}
    .trange{width:100%;accent-color:var(--cy)}
    .tsel{padding:.6rem .9rem;background:rgba(0,0,0,.3);border:1px solid var(--bd);border-radius:8px;color:var(--w);font-family:var(--mo);font-size:.78rem;outline:none;cursor:pointer;transition:border-color var(--t)}.tsel:focus{border-color:var(--cy)}
    .tnum{width:90px;padding:.62rem .8rem;background:rgba(0,0,0,.3);border:1px solid var(--bd);border-radius:8px;color:var(--w);font-family:var(--mo);font-size:.82rem;outline:none;transition:border-color var(--t)}.tnum:focus{border-color:var(--cy)}
    .btn-soon{display:inline-flex;align-items:center;font-family:var(--mo);font-size:.72rem;color:var(--mu);padding:.6rem 1.1rem;border-radius:4px;border:1px solid var(--bd);cursor:not-allowed;opacity:.55}
    .toast{position:fixed;bottom:2rem;right:2rem;z-index:9999;background:var(--g);color:#06090f;font-family:var(--mo);font-size:.72rem;font-weight:700;padding:.6rem 1.2rem;border-radius:6px;transform:translateY(60px);opacity:0;transition:transform .3s var(--sp),opacity .3s}
    .toast.show{transform:translateY(0);opacity:1}
    footer{position:relative;z-index:2;border-top:1px solid var(--bd);padding:2rem 0;margin-top:2rem}
    .foot-in{max-width:1200px;margin:0 auto;padding:0 2.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
    .foot-logo{font-family:var(--mo);font-size:.95rem}.foot-logo .lx{color:var(--w)}.foot-logo .wis{color:var(--g)}
    .foot-copy{font-family:var(--mo);font-size:.65rem;color:var(--mu)}
    .foot-links{display:flex;gap:1.5rem}.foot-link{font-family:var(--mo);font-size:.68rem;color:var(--mu2);transition:color var(--t)}.foot-link:hover{color:var(--cy)}
    .ru{opacity:0;transform:translateY(22px);transition:opacity .65s var(--ease),transform .65s var(--ease)}.ru.in{opacity:1;transform:translateY(0)}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    @media(max-width:768px){nav{padding:1rem 1.25rem}.nav-links,.nav-back{display:none}.nav-toggle{display:flex}.page-hero{padding:7rem 1.25rem 3rem}.tools-section{padding:0 1.25rem 4rem}.foot-in{flex-direction:column;text-align:center}.tstats{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-dot" id="cursorDot"></div>
  <canvas id="bg-canvas"></canvas>
  <div class="noise"></div>
  <div class="toast" id="toast">Copied!</div>

  <nav id="nav">
    <a href="/" class="nav-logo"><span class="lx">lx</span><span class="wis">wis</span><span class="blink">_</span></a>
    <ul class="nav-links">
      <li><a href="/">home</a></li>
      <li><a href="/portfolio">portfolio</a></li>
      <li><a href="/games">games</a></li>
      <li><a href="/tools" class="active">tools</a></li>
      <li><a href="/links">links</a></li>
    </ul>
    <a href="/" class="nav-back">← home</a>
    <button class="nav-toggle" id="navToggle"><span></span><span></span><span></span></button>
  </nav>
  <div class="mob" id="mob">
    <a href="/">home</a><a href="/portfolio">portfolio</a><a href="/games">games</a><a href="/tools">tools</a><a href="/links">links</a>
  </div>

  <div class="page-hero">
    <div class="eyebrow ru">🛠️ lxwis.site/tools</div>
    <h1 class="page-title ru" style="transition-delay:.06s">Web <span class="hi">Tools</span></h1>
    <p class="page-sub ru" style="transition-delay:.12s">Tap a card, expand it, use it instantly. No login, no bs.</p>
  </div>

  <div class="tools-section">
    <div class="sec-div ru">⚡ live — use now</div>
    <div class="tools-grid" id="liveGrid"></div>
    <div class="sec-div ru" style="margin-top:3.5rem">🔒 coming soon</div>
    <div class="tools-grid" id="soonGrid"></div>
  </div>

  <footer>
    <div class="foot-in">
      <span class="foot-logo"><span class="lx">lx</span><span class="wis">wis</span></span>
      <span class="foot-copy">lxwis.site/tools · 2025</span>
      <div class="foot-links">
        <a href="/portfolio" class="foot-link">portfolio</a>
        <a href="/games" class="foot-link">games</a>
        <a href="/links" class="foot-link">links</a>
      </div>
    </div>
  </footer>

  <script>
  (function(){
    if(matchMedia('(pointer:fine)').matches){
      const cur=document.getElementById('cursor'),dot=document.getElementById('cursorDot');
      let mx=-200,my=-200,cx=-200,cy=-200;
      document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
      (function loop(){cx+=(mx-cx)*.12;cy+=(my-cy)*.12;cur.style.left=cx+'px';cur.style.top=cy+'px';dot.style.left=mx+'px';dot.style.top=my+'px';requestAnimationFrame(loop)})();
      document.addEventListener('mouseenter',e=>{if(e.target.matches('a,button,input,textarea,select,.tool-card'))cur.classList.add('big')},{capture:true});
      document.addEventListener('mouseleave',e=>{if(e.target.matches('a,button,input,textarea,select,.tool-card'))cur.classList.remove('big')},{capture:true});
    }

    const bgc=document.getElementById('bg-canvas'),bctx=bgc.getContext('2d');
    let W,H,pts=[];
    function rsz(){W=bgc.width=innerWidth;H=bgc.height=innerHeight}
    class P{constructor(){this.reset()}reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.vx=(Math.random()-.5)*.25;this.vy=(Math.random()-.5)*.25;this.r=Math.random()*1.1+.2;this.a=Math.random()*.35+.06;this.c=Math.random()>.6?'0,229,255':'57,255,140'}update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>W||this.y<0||this.y>H)this.reset()}draw(){bctx.beginPath();bctx.arc(this.x,this.y,this.r,0,Math.PI*2);bctx.fillStyle=`rgba(${this.c},${this.a})`;bctx.fill()}}
    function initBg(){rsz();pts=Array.from({length:65},()=>new P())}
    (function frame(){bctx.clearRect(0,0,W,H);for(let i=0;i<pts.length;i++){for(let j=i+1;j<pts.length;j++){const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<110){bctx.strokeStyle=`rgba(0,229,255,${(1-d/110)*.04})`;bctx.lineWidth=.5;bctx.beginPath();bctx.moveTo(pts[i].x,pts[i].y);bctx.lineTo(pts[j].x,pts[j].y);bctx.stroke()}}pts[i].update();pts[i].draw()}requestAnimationFrame(frame)})();
    window.addEventListener('resize',initBg,{passive:true});initBg();

    const nav=document.getElementById('nav');
    window.addEventListener('scroll',()=>nav.classList.toggle('scrolled',scrollY>40),{passive:true});
    const tog=document.getElementById('navToggle'),mob=document.getElementById('mob');
    tog.addEventListener('click',()=>{tog.classList.toggle('open');mob.classList.toggle('open');document.body.style.overflow=mob.classList.contains('open')?'hidden':''});
    mob.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>{tog.classList.remove('open');mob.classList.remove('open');document.body.style.overflow=''}));

    const io=new IntersectionObserver(e=>e.forEach(x=>{if(x.isIntersecting){x.target.classList.add('in');io.unobserve(x.target)}}),{threshold:.05});
    document.querySelectorAll('.ru').forEach(el=>io.observe(el));
    setTimeout(()=>document.querySelectorAll('.page-hero .ru').forEach(el=>el.classList.add('in')),80);

    function showToast(m='Copied!'){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
    function cp(txt){navigator.clipboard.writeText(txt).then(()=>showToast())}

    const LOREM=['Lorem ipsum dolor sit amet, consectetur adipiscing elit.','Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.','Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris.','Duis aute irure dolor in reprehenderit in voluptate velit esse cillum.','Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia.','Pellentesque habitant morbi tristique senectus et netus et malesuada.','Vestibulum tortor quam, feugiat vitae, ultricies eget, tempor sit amet.','Donec eu libero sit amet quam egestas semper aenean ultricies.','Curabitur pretium tincidunt lacus nulla mauris, dignissim tempus.'];

    const LIVE=[
      {emoji:'📝',name:'Char Counter',cat:'text',accent:'rgba(57,255,140,.25)',aT:'#39ff8c',desc:'Count characters, words, lines, and no-space characters — updates live.',
       build:el=>{el.innerHTML=`<div class="tui"><div class="tlb">Your text</div><textarea class="tin" id="ccI" placeholder="Paste or type..." rows="4"></textarea><div class="tstats"><div class="tstat"><div class="tstat-v cy" id="cc-c">0</div><div class="tstat-l">Chars</div></div><div class="tstat"><div class="tstat-v g" id="cc-w">0</div><div class="tstat-l">Words</div></div><div class="tstat"><div class="tstat-v vi" id="cc-l">0</div><div class="tstat-l">Lines</div></div><div class="tstat"><div class="tstat-v go" id="cc-n">0</div><div class="tstat-l">No Space</div></div></div></div>`;el.querySelector('#ccI').addEventListener('input',e=>{const v=e.target.value;el.querySelector('#cc-c').textContent=v.length;el.querySelector('#cc-w').textContent=v.trim()?v.trim().split(/\s+/).length:0;el.querySelector('#cc-l').textContent=v?v.split('\n').length:0;el.querySelector('#cc-n').textContent=v.replace(/\s/g,'').length})}},
      {emoji:'🔐',name:'Base64',cat:'encoding',accent:'rgba(0,229,255,.25)',aT:'#00e5ff',desc:'Encode plain text to Base64 or decode Base64 back to readable text.',
       build:el=>{el.innerHTML=`<div class="tui"><div class="tlb">Input</div><textarea class="tin" id="b64I" placeholder="Text or Base64..." rows="3"></textarea><div class="trow"><button class="tbtn cy" id="b64E">Encode →</button><button class="tbtn bd" id="b64D">← Decode</button><button class="tbtn bd" id="b64C">Copy</button></div><div class="tlb">Output</div><div class="tout cy" id="b64O">Result...</div></div>`;el.querySelector('#b64E').addEventListener('click',()=>{try{el.querySelector('#b64O').textContent=btoa(unescape(encodeURIComponent(el.querySelector('#b64I').value)))}catch{el.querySelector('#b64O').textContent='❌ Encode failed'}});el.querySelector('#b64D').addEventListener('click',()=>{try{el.querySelector('#b64O').textContent=decodeURIComponent(escape(atob(el.querySelector('#b64I').value.trim())))}catch{el.querySelector('#b64O').textContent='❌ Invalid Base64'}});el.querySelector('#b64C').addEventListener('click',()=>cp(el.querySelector('#b64O').textContent))}},
      {emoji:'📄',name:'Lorem Generator',cat:'placeholder',accent:'rgba(157,110,255,.25)',aT:'#9d6eff',desc:'Generate Lorem Ipsum placeholder text — choose how many paragraphs.',

      {emoji:'⏱️',name:'Timestamp',cat:'datetime',accent:'rgba(57,255,140,.25)',aT:'#39ff8c',desc:'Convert Unix timestamps to dates and back. Live current timestamp.',

      {emoji:'🧮',name:'Calculator',cat:'math',accent:'rgba(157,110,255,.25)',aT:'#9d6eff',desc:'Clean calculator with keyboard support — basics plus percentage.',
       build:el=>{el.innerHTML=`<div style="display:flex;flex-direction:column;gap:.5rem"><div style="background:rgba(0,0,0,.4);border:1px solid var(--bd);border-radius:10px;padding:1rem;text-align:right"><div id="cExpr" style="font-family:var(--mo);font-size:.7rem;color:var(--mu2);min-height:1rem;margin-bottom:.3rem"></div><div id="cDisp" style="font-family:var(--mo);font-size:1.75rem;color:var(--w);word-break:break-all">0</div></div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:.4rem" id="cBtns"></div></div>`;const btns=[['C','±','%','÷'],['7','8','9','×'],['4','5','6','−'],['1','2','3','+'],['0','.','⌫','=']];const g=el.querySelector('#cBtns');btns.forEach(row=>row.forEach(b=>{const btn=document.createElement('button');btn.textContent=b;btn.style.cssText=`padding:.7rem;border-radius:8px;font-family:var(--mo);font-size:.9rem;font-weight:700;cursor:pointer;border:1px solid var(--bd);transition:filter .15s;background:${['÷','×','−','+','='].includes(b)?b==='='?'var(--vi)':'rgba(157,110,255,.2)':['C','±','%'].includes(b)?'rgba(255,255,255,.07)':'var(--sur)'};color:var(--w)`;btn.addEventListener('mouseenter',()=>btn.style.filter='brightness(1.3)');btn.addEventListener('mouseleave',()=>btn.style.filter='');btn.addEventListener('click',()=>ci(b));g.appendChild(btn)}));let disp='0',expr='',op='',prev='',fresh=false;const D=el.querySelector('#cDisp'),E=el.querySelector('#cExpr');function ci(v){if(v==='C'){disp='0';expr='';op='';prev='';fresh=false}else if(v==='⌫'){disp=disp.length>1?disp.slice(0,-1):'0'}else if(v==='±'){disp=disp.startsWith('-')?disp.slice(1):'-'+disp}else if(v==='%'){disp=String(parseFloat(disp)/100)}else if(['÷','×','−','+'].includes(v)){prev=disp;op=v;expr=disp+' '+v;fresh=true}else if(v==='='){if(!op)return;const a=parseFloat(prev),b=parseFloat(disp);E.textContent=expr+' '+disp+' =';const res={'+':a+b,'−':a-b,'×':a*b,'÷':a/b}[op];disp=String(parseFloat(res.toFixed(10)));op='';prev='';fresh=false}else{if(fresh){disp='0';fresh=false}disp=disp==='0'&&v!=='.'?v:disp+v}D.textContent=disp;if(v!=='=')E.textContent=expr}}},

or=color;el.querySelector('#pmBar').style.background=color;el.querySelector('#pmTgl').textContent='▶ Start';upd()}el.querySelector('#pmTgl').addEventListener('click',()=>{run=!run;if(run){intv=setInterval(tick,1000);el.querySelector('#pmTgl').textContent='⏸ Pause'}else{clearInterval(intv);el.querySelector('#pmTgl').textContent='▶ Start'}});el.querySelector('#pmRst').addEventListener('click',()=>{clearInterval(intv);run=false;left=tot;el.querySelector('#pmTgl').textContent='▶ Start';upd()});el.querySelector('#pmW').addEventListener('click',()=>setM(25,'focus','var(--ro)'));el.querySelector('#pmS').addEventListener('click',()=>setM(5,'break','var(--cy)'));el.querySelector('#pmL').addEventListener('click',()=>setM(15,'long break','var(--vi)'));upd()}},

       build:el=>{el.innerHTML=`<div class="tui"><div class="trow" style="flex-wrap:wrap;gap:1rem;align-items:center"><div><div class="tlb">Color 1</div><input type="color" id="gc1" value="#39ff8c" style="width:52px;height:40px;border-radius:8px;border:1px solid var(--bd);cursor:pointer;background:none"/></div><div><div class="tlb">Color 2</div><input type="color" id="gc2" value="#9d6eff" style="width:52px;height:40px;border-radius:8px;border:1px solid var(--bd);cursor:pointer;background:none"/></div><div><div class="tlb">Color 3</div><input type="color" id="gc3" value="#00e5ff" style="width:52px;height:40px;border-radius:8px;border:1px solid var(--bd);cursor:pointer;background:none"/><label style="font-family:var(--mo);font-size:.6rem;color:var(--mu2);display:flex;align-items:center;gap:.3rem;margin-top:.3rem"><input type="checkbox" id="gc3e"> Enable</label></div><div><div class="tlb">Direction</div><select class="tsel" id="gcD"><option value="to right">→ Right</option><option value="to bottom">↓ Down</option><option value="135deg">↘ Diagonal</option><option value="to top right">↗ Top Right</option><option value="circle">◎ Radial</option></select></div></div><div id="gcPrev" style="width:100%;height:100px;border-radius:10px;border:1px solid var(--bd);margin:.5rem 0;transition:background .3s"></div><div class="tlb">CSS Code</div><div class="tout vi" id="gcOut" style="cursor:pointer" title="Click to copy"></div><button class="tbtn vi" id="gcCp">Copy CSS</button></div>`;function gcUpd(){const c1=el.querySelector('#gc1').value,c2=el.querySelector('#gc2').value,c3=el.querySelector('#gc3').value,u3=el.querySelector('#gc3e').checked,dir=el.querySelector('#gcD').value;const stops=u3?`${c1}, ${c3}, ${c2}`:`${c1}, ${c2}`;const css=dir==='circle'?`radial-gradient(circle, ${stops})`:`linear-gradient(${dir}, ${stops})`;el.querySelector('#gcPrev').style.background=css;el.querySelector('#gcOut').textContent=`background: ${css};`}['gc1','gc2','gc3','gcD'].forEach(id=>el.querySelector('#'+id).addEventListener('input',gcUpd));el.querySelector('#gc3e').addEventListener('change',gcUpd);el.querySelector('#gcCp').addEventListener('click',()=>cp(el.querySelector('#gcOut').textContent));el.querySelector('#gcOut').addEventListener('click',()=>cp(el.querySelector('#gcOut').textContent));gcUpd()}},

    function makeCard(tool,live){
      const card=document.createElement('div');
      card.className='tool-card';
      card.style.setProperty('--card-accent',tool.accent);
      card.style.setProperty('--card-accent-text',tool.aT||'#00e5ff');
      const uid=`tui-${tool.name.replace(/\s/g,'-')}`;
      card.innerHTML=`<div class="card-head"><span class="card-emoji">${tool.emoji}</span><div class="card-info"><div class="card-name">${tool.name}</div><div class="card-cat">${tool.cat}</div><span class="chip ${live?'chip-live':'chip-soon'}">${live?'⚡ live':'coming soon'}</span></div><span class="card-chevron">▾</span></div><div class="card-body"><div class="card-body-inner"><p class="card-desc">${tool.desc}</p><div id="${uid}"></div>${!live?'<span class="btn-soon">🔒 Not available yet</span>':''}</div></div>`;
      card.querySelector('.card-head').addEventListener('click',()=>{
        const open=card.classList.contains('expanded');
        document.querySelectorAll('.tool-card').forEach(c=>{c.classList.remove('expanded');c.querySelector('.card-body').classList.remove('open')});
        if(!open){card.classList.add('expanded');card.querySelector('.card-body').classList.add('open');if(live&&tool.build&&!card.dataset.built){tool.build(card.querySelector('#'+uid));card.dataset.built='1'}}
      });
      return card;
    }

    LIVE.forEach(t=>document.getElementById('liveGrid').appendChild(makeCard(t,true)));
    SOON.forEach(t=>document.getElementById('soonGrid').appendChild(makeCard(t,false)));
  })();
